# Build and push multi-arch image to GHCR (trigger: tag v*).
# Image: ghcr.io/<org>/<repo>:<semver> and :latest (latest omitted for prerelease tags with '-' in ref_name).
name: Docker publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject.toml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:?}"
          VER="${TAG#v}"
          PYVER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$VER" != "$PYVER" ]; then
            echo "::error::Git tag '$TAG' implies version '$VER' but pyproject.toml has '$PYVER'"
            exit 1
          fi

      - name: Set image name (lowercase for OCI)
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=arctis
            org.opencontainers.image.description=Arctis API, engine runtime, and Ghost CLI
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.push.outputs.digest }}"
